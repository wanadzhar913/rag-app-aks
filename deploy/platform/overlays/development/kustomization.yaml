apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-platform-dev

resources:
  - namespace.yaml
  - ../../base
  - ../../../k8s/base/rabbitmq
  - rabbitmq-external-secret.yaml

patches:
  - target:
      kind: ClusterSecretStore
      name: azure-keyvault
    patch: |
      - op: replace
        path: /spec/provider/azurekv/vaultUrl
        value: "https://ragappdevkv.vault.azure.net/"
