apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-platform-development
  namespace: argocd
spec:
  project: rag-app
  source:
    repoURL: https://github.com/wanadzhar913/rag-app-aks.git
    targetRevision: HEAD
    path: deploy/platform/overlays/development
  destination:
    server: https://kubernetes.default.svc
    namespace: rag-platform-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
