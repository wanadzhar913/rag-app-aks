apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag-platform-production
  namespace: argocd
spec:
  project: rag-app
  source:
    repoURL: https://github.com/wanadzhar913/rag-app-aks.git
    targetRevision: HEAD
    path: deploy/platform/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: rag-platform-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
