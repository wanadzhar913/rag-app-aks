apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: azure-keyvault
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: ragapp-dev-postgres-user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: ragapp-dev-postgres-password
    - secretKey: RABBITMQ_USER
      remoteRef:
        key: ragapp-dev-rabbitmq-user
    - secretKey: RABBITMQ_PASS
      remoteRef:
        key: ragapp-dev-rabbitmq-password
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: ragapp-dev-s3-access-key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: ragapp-dev-s3-secret-key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: ragapp-dev-openai-api-key
    - secretKey: OPENAI_BASE_URL
      remoteRef:
        key: ragapp-dev-openai-base-url
