apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: rag-app
data:
  ENVIRONMENT: "development"
  DEBUG: "true"
  PROJECT_NAME: "RAG App"
  DEFAULT_LLM_MODEL: "gpt-5-mini"
  MAX_TOKENS: "4096"
  POSTGRES_DB: "rag_app_db"
  POSTGRES_PORT: "5432"
  POSTGRES_HOST: "postgres"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_BUCKET: "documents"
  S3_REGION: "us-east-1"
