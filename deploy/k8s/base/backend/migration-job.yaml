apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrate
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-migrate
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: rag-app
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: rag-app/backend:latest
          command:
            - sh
            - -c
            - uv run alembic upgrade head
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
