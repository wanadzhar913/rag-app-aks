apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-app

labels:
  - pairs:
      app.kubernetes.io/part-of: rag-app
      app.kubernetes.io/managed-by: argocd

resources:
  # Backend
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/configmap.yaml
  - backend/migration-job.yaml
  # Ingestion worker
  - ingestion/deployment.yaml
  - ingestion/configmap.yaml

images:
  - name: rag-app/backend
    newTag: latest
  - name: rag-app/ingestion
    newTag: latest
